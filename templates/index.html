<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicSearch: Nexus Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0c; color: #d1d1d6; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; text-align: center; }
        h1 { color: #ff3b30; text-shadow: 0 0 10px rgba(255, 59, 48, 0.4); }
        
        /* Slicers Section */
        .slicers { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; align-items: center; }
        .group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .btn-slicer { 
            background: #1c1c1e; color: #fff; border: 1px solid #3a3a3c; 
            padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9em; 
        }
        .btn-slicer:hover { border-color: #ff3b30; background: #2c2c2e; }
        
        /* Mana Dots */
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; border: 1px solid #fff; }
        .w { background: #fdf5cd; } .u { background: #0e68ab; } .b { background: #121212; } .r { background: #d32f2f; } .g { background: #00733e; }

        /* Search Bar */
        form { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; }
        #searchBar { width: 60%; padding: 12px; border-radius: 25px; border: 1px solid #3a3a3c; background: #1c1c1e; color: #fff; }
        .btn-optimize { padding: 12px 25px; border-radius: 25px; border: none; background: #ff3b30; color: #fff; font-weight: bold; cursor: pointer; }

        /* Results Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card-box { background: #1c1c1e; padding: 10px; border-radius: 12px; border: 1px solid #2c2c2e; transition: 0.3s; }
        .card-box:hover { transform: translateY(-5px); border-color: #ff3b30; }
        .card-box img { width: 100%; border-radius: 8px; }
        .card-name { margin-top: 10px; font-size: 0.85em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MagicSearch: Nexus Edition</h1>
        <p style="color: #8e8e93;">Commander Deck Optimization Engine</p>

        <div class="slicers">
            <div class="group">
                <button class="btn-slicer" onclick="addText('f:draw')">💧 Draw</button>
                <button class="btn-slicer" onclick="addText('f:ramp')">🌱 Ramp</button>
                <button class="btn-slicer" onclick="addText('f:removal')">💀 Removal</button>
                <button class="btn-slicer" onclick="addText('f:wrath')">💥 Wipes</button>
            </div>
            <div class="group">
                <button class="btn-slicer" onclick="addText('c:w')"><span class="dot w"></span> W</button>
                <button class="btn-slicer" onclick="addText('c:u')"><span class="dot u"></span> U</button>
                <button class="btn-slicer" onclick="addText('c:b')"><span class="dot b"></span> B</button>
                <button class="btn-slicer" onclick="addText('c:r')"><span class="dot r"></span> R</button>
                <button class="btn-slicer" onclick="addText('c:g')"><span class="dot g"></span> G</button>
                <button class="btn-slicer" style="background: #444;" onclick="document.getElementById('searchBar').value = ''">🗑️ Clear</button>
            </div>
        </div>

        <form method="POST">
            <input type="text" name="query" id="searchBar" placeholder="Insert Scryfall syntax..." value="{{ query }}">
            <button type="submit" class="btn-optimize">Optimize</button>
        </form>

        <div class="grid">
            {% for card in cards %}
            <div class="card-box">
                {% if card.image_uris %}
                    <img src="{{ card.image_uris.normal }}" alt="{{ card.name }}">
                {% else %}
                    <img src="https://placehold.co/488x680?text=No+Image" alt="No Image">
                {% endif %}
                <p class="card-name">{{ card.name }}</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function addText(val) {
            const bar = document.getElementById('searchBar');
            if (!bar.value.includes(val)) {
                bar.value = (bar.value + " " + val).trim();
            }
        }
    </script>
</body>
</html>
