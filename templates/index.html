<div class="group" style="background: #1c1c1e; padding: 10px; border-radius: 15px; border: 1px solid #ff9f0a;">
    <span style="font-size: 0.8em; margin-right: 10px; color: #ff9f0a;">🎴 Import Deck:</span>
    {% for name, id in decks.items() %}
        <button type="button" class="btn-slicer" onclick="fetchArchidekt('{{ id }}')">{{ name }}</button>
    {% endfor %}
</div>

<script>
    async function fetchArchidekt(deckId) {
        const bar = document.getElementById('searchBar');
        bar.placeholder = "Importing from Archidekt...";
        
        try {
            const response = await fetch(`/import_deck/${deckId}`);
            const data = await response.json();
            if (data.query) {
                bar.value = data.query;
            } else {
                alert("Error: " + data.error);
            }
        } catch (e) {
            alert("Connection to Archidekt failed.");
        } finally {
            bar.placeholder = "Search Command...";
        }
    }
</script>
